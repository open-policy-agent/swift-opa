name: Check

on:
  workflow_dispatch:
    inputs:
      debug_benchmarks:
        description: "Print benchmark results for debugging"
        type: boolean
        default: false
  pull_request: {}

# When a new revision is pushed to a PR, cancel all in-progress CI runs for that
# PR. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Build Swift ${{ matrix.swift }}${{ matrix.xcode && format(', Xcode {0}', matrix.xcode) || '' }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            xcode: "16.2"
            swift: "6.0.3"
          - os: macos-latest
            xcode: "16.4"
            swift: "6.1" # We can't go more modern than 6.1.0 for the 6.1 runner, due to Xcode version support.
          - os: macos-latest
            xcode: "26.2"
            swift: "6.2.3"
          - os: ubuntu-latest
            swift: "6.0.3"
          - os: ubuntu-latest
            swift: "6.2"
    env:
      XCODE_VERSION: ${{ matrix.xcode }}
      DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode }}.app"
      SWIFT_VERSION: ${{ matrix.swift }}
    steps:
      - name: Select Xcode version
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch "${DEVELOPER_DIR}/Contents/Developer"
          xcodebuild -version
      - uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a #v2.4.0
        if: runner.os == 'Linux'
        with:
          swift-version: ${{ matrix.swift }}
      - name: Show Swift version
        run: swift --version
      - name: Fail if Swift version does not match expected version (${{ matrix.swift }})
        run: |
          SWIFT_OUTPUT=$(swift --version)
          echo "${SWIFT_OUTPUT}"
          # Check if our expected Swift version is the one in use.
          if ! echo "${SWIFT_OUTPUT}" | grep -q "${SWIFT_VERSION}"; then
            ACTUAL=$(echo "${SWIFT_OUTPUT}" | head -n 1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
            echo "::error::Expected Swift ${SWIFT_VERSION}, got ${ACTUAL}"
            echo "**Version Mismatch**: Expected \`${SWIFT_VERSION}\`, got \`${ACTUAL}\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install jemalloc
        if: runner.os == 'macOS'
        run: brew install jemalloc
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build
        run: make build
      - name: make fmt lint test (ComplianceSuite)
        run: make fmt lint test
        working-directory: ComplianceSuite
      - run: make test-compliance || true # NB: This doesn't succeed yet!

  diff:
    name: diff compliance tests (vs main)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - run: sudo xcode-select -s /Applications/Xcode_26.0.app
      - run: swift --version
      - name: checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pr/swift-opa
          fetch-depth: 0 # fetch all history for all branches and tags
          persist-credentials: false
      - name: checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: open-policy-agent/swift-opa
          ref: main
          path: main/swift-opa
          persist-credentials: false
      - name: compliance tests (main)
        run: |
          (make test-compliance || true) > results
          ../../../pr/swift-opa/ComplianceSuite/tools/passed.sh < results > ../../../main-passed
          ../../../pr/swift-opa/ComplianceSuite/tools/failed.sh < results > ../../../main-failed
        working-directory: main/swift-opa/ComplianceSuite
      - name: compliance tests (pr)
        run: |
          (make test-compliance || true) > results
          ./tools/passed.sh < results > ../../../pr-passed
          ./tools/failed.sh < results > ../../../pr-failed
        working-directory: pr/swift-opa/ComplianceSuite
      - name: summary diff
        run: |
          diff_and_print() {
            local file1="$1"
            local file2="$2"
            local header="$3"

            if ! diff -q "$file1" "$file2" > /dev/null 2>&1; then
              echo "## $header"
              echo '```diff'
              diff "$file1" "$file2" || true
              echo '```'
            fi
          }
          diff_and_print main-passed pr-passed 'passed (main vs PR)' >> $GITHUB_STEP_SUMMARY
          diff_and_print main-failed pr-failed 'failed (main vs PR)' >> $GITHUB_STEP_SUMMARY

  capabilities-check:
    name: check capabilities.json unchanged
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - run: sudo xcode-select -s /Applications/Xcode_26.0.app
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: generate capabilities
        run: make generate
      - name: check for changes
        run: |
          if git diff --exit-code capabilities.json; then
            echo "capabilities.json is up-to-date"
          else
            echo "::error::capabilities.json needs to be updated"
            echo "Run: swift run swift-opa-cli capabilities opa-capabilities.json > capabilities.json"
            echo "Differences:"
            git diff capabilities.json
            exit 1
          fi

  gh-actions-lint:
    name: Github Actions Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0

  benchmark:
    name: benchmark comparison (vs base)
    runs-on: ubuntu-latest
    container: swift:noble
    continue-on-error: true
    env:
      BENCHMARK_MAX_DURATION_SECONDS: "3"
      BENCHMARK_WARMUP_ITERATIONS: "100"
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Detect Swift version
        id: swift
        run: echo "version=$(swift --version | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)" >> "$GITHUB_OUTPUT"
      - name: Install jemalloc and zstd for cache
        run: |
          apt-get update -q
          apt-get install -yq libjemalloc-dev zstd
      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pr
          persist-credentials: false
      - name: Restore .build cache
        id: build-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            base/Benchmarks/.build
            pr/Benchmarks/.build
          key: benchmark-build-swift${{ steps.swift.outputs.version }}-${{ github.event.pull_request.base.sha }}
          restore-keys: benchmark-build-swift${{ steps.swift.outputs.version }}-
      - name: Restore baseline results cache
        id: baseline-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: base/Benchmarks/.benchmarkBaselines
          key: benchmark-baseline-swift${{ steps.swift.outputs.version }}-${{ github.event.pull_request.base.sha }}
      - name: Run benchmarks on base and save baseline
        if: steps.baseline-cache.outputs.cache-hit != 'true'
        run: |
          swift package -c release --disable-sandbox \
            --package-path Benchmarks \
            benchmark baseline update base \
            --no-progress
        working-directory: base
      - name: Print base benchmark results
        if: inputs.debug_benchmarks == true
        run: |
          swift package -c release --disable-sandbox \
            --package-path Benchmarks \
            benchmark baseline read base \
            --no-progress
        working-directory: base
      - name: Copy baseline to PR checkout
        run: cp -R base/Benchmarks/.benchmarkBaselines pr/Benchmarks/.benchmarkBaselines
      - name: Run benchmarks on PR and save baseline
        run: |
          swift package -c release --disable-sandbox \
            --package-path Benchmarks \
            benchmark baseline update pr \
            --no-progress
        working-directory: pr
      - name: Print PR benchmark results
        if: inputs.debug_benchmarks == true
        run: |
          swift package -c release --disable-sandbox \
            --package-path Benchmarks \
            benchmark baseline read pr \
            --no-progress
        working-directory: pr
      - name: Compare PR benchmarks against baseline
        id: compare
        run: |
          set +e
          swift package -c release --disable-sandbox \
            --package-path Benchmarks \
            benchmark baseline compare base pr \
            --no-progress \
            --format markdown \
            2>/dev/null \
            | tee benchmark-comparison.md
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          case "${EXIT_CODE}" in
            0) SUMMARY="✅ No significant performance changes" ;;
            2) SUMMARY="❌ Potential performance regression detected 📉" ;;
            4) SUMMARY="⚠️ Performance improvement detected 📈" ;;
            *) SUMMARY="❓ Benchmark comparison completed (exit code: ${EXIT_CODE})" ;;
          esac
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

          {
            echo "comparison<<EOF"
            cat benchmark-comparison.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        working-directory: pr
      - name: Find existing benchmark comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- benchmark-comparison -->"
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- benchmark-comparison -->
            ## Benchmark Comparison

            ${{ steps.compare.outputs.summary }}

            <details>
              <summary>Full comparison output</summary>

            ${{ steps.compare.outputs.comparison }}

            </details>
